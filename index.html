<body>

  <!-- SVG Definitions -->
  <svg class="svg-defs" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Paper grain texture filter -->
      <filter id="paper-grain" x="0" y="0" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="5" stitchTiles="stitch" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
        <feComponentTransfer in="gray" result="faded">
          <feFuncA type="linear" slope="0.06"/>
        </feComponentTransfer>
        <feBlend in="SourceGraphic" in2="faded" mode="multiply"/>
      </filter>

      <!-- Corner botanical flourish (designed for top-left, rotated via CSS for other corners) -->
      <symbol id="corner-botanical" viewBox="0 0 200 200" overflow="visible">
        <!-- Main vine - sweeps up from bottom along left edge, curves across top -->
        <path d="M25,200 C22,178 20,155 19,132 C18,108 20,86 28,66 C36,48 50,34 70,26 C90,18 115,16 140,16 C160,16 178,18 200,22"
              fill="none" stroke="#4A7C59" stroke-width="2.8" stroke-linecap="round"/>

        <!-- Secondary vine, thinner, slightly offset -->
        <path d="M32,198 C30,176 28,152 28,128 C28,104 32,82 42,64 C52,48 66,38 86,32 C106,26 128,24 152,26 C170,28 186,30 198,34"
              fill="none" stroke="#4A7C59" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

        <!-- ===== LARGE CORNER FLOWER (~52, 44) ===== -->
        <!-- Petals -->
        <path d="M52,48 C44,40 36,28 40,20 C46,26 52,38 52,48Z" fill="#D4705A"/>
        <path d="M52,48 C52,36 56,24 62,20 C64,30 58,42 52,48Z" fill="#D4705A"/>
        <path d="M52,48 C42,42 34,34 36,26 C44,30 50,40 52,48Z" fill="#C4604A" opacity="0.75"/>
        <path d="M52,48 C58,38 66,30 68,34 C62,40 56,46 52,48Z" fill="#C4604A" opacity="0.75"/>
        <path d="M52,48 C48,36 46,24 50,18 C54,24 54,36 52,48Z" fill="#D4705A" opacity="0.6"/>
        <!-- Flower center -->
        <circle cx="52" cy="40" r="5" fill="#C9A84C"/>
        <circle cx="52" cy="40" r="2.5" fill="#D4705A" opacity="0.8"/>

        <!-- ===== LEAVES ON LEFT VINE (vertical section) ===== -->
        <!-- Leaf pair at y~175 -->
        <path d="M22,178 C12,170 6,158 10,150 C16,160 22,170 22,178Z" fill="#4A7C59"/>
        <path d="M28,174 C38,166 46,154 42,146 C34,156 28,166 28,174Z" fill="#4A7C59"/>

        <!-- Leaf pair at y~145 -->
        <path d="M20,148 C8,140 2,126 8,118 C14,128 20,140 20,148Z" fill="#4A7C59"/>
        <path d="M26,144 C38,134 48,122 42,114 C34,124 26,136 26,144Z" fill="#4A7C59"/>

        <!-- Leaf pair at y~115 -->
        <path d="M19,118 C8,110 2,98 8,90 C14,100 19,110 19,118Z" fill="#4A7C59"/>
        <path d="M26,114 C38,104 48,92 42,84 C34,94 26,106 26,114Z" fill="#4A7C59"/>

        <!-- Single leaf at y~88 -->
        <path d="M24,90 C14,82 10,70 16,64 C20,74 24,84 24,90Z" fill="#4A7C59"/>
        <path d="M30,86 C40,78 46,66 40,60 C34,70 30,80 30,86Z" fill="#4A7C59" opacity="0.8"/>

        <!-- ===== LEAVES ON TOP VINE (horizontal section) ===== -->
        <!-- Leaf pair at x~100 -->
        <path d="M98,18 C90,6 84,0 88,0 C92,4 96,12 98,18Z" fill="#4A7C59"/>
        <path d="M102,26 C110,36 120,42 120,36 C116,30 108,26 102,26Z" fill="#4A7C59"/>

        <path d="M158,16 C152,4 150,0 156,2 C158,8 158,14 158,16Z" fill="#4A7C59"/>
        <path d="M162,24 C168,34 176,38 176,32 C172,28 166,24 162,24Z" fill="#4A7C59"/>

        <!-- Single leaves at x~185 -->
        <path d="M184,20 C180,8 178,2 184,4 C186,10 186,18 184,20Z" fill="#4A7C59"/>
        <path d="M188,26 C194,34 198,38 198,32 C196,28 192,26 188,26Z" fill="#4A7C59" opacity="0.8"/>

        <!-- ===== SECONDARY SMALL FLOWER on left vine (~14, 132) ===== -->
        <path d="M12,136 C8,130 4,124 8,120 C12,126 14,132 12,136Z" fill="#D4705A" opacity="0.75"/>
        <path d="M14,136 C18,130 22,124 20,120 C16,126 14,132 14,136Z" fill="#D4705A" opacity="0.75"/>
        <path d="M10,134 C6,130 2,126 4,122 C8,126 10,130 10,134Z" fill="#C4604A" opacity="0.6"/>
        <circle cx="13" cy="130" r="2.5" fill="#C9A84C"/>

        <!-- ===== SMALL BUD on top vine (~170, 18) ===== -->
        <path d="M172,20 C170,14 168,8 172,6 C174,10 174,16 172,20Z" fill="#D4705A" opacity="0.65"/>
        <path d="M174,20 C176,14 178,10 176,6 C174,10 174,16 174,20Z" fill="#D4705A" opacity="0.5"/>

        <!-- ===== SMALL BUD on left vine (~22, 165) ===== -->
        <path d="M18,168 C14,162 12,156 16,154 C18,160 18,166 18,168Z" fill="#D4705A" opacity="0.55"/>

        <!-- ===== BERRIES near corner ===== -->
        <circle cx="40" cy="68" r="2.5" fill="#7B8FBF" opacity="0.7"/>
        <circle cx="36" cy="64" r="2" fill="#7B8FBF" opacity="0.55"/>
        <circle cx="44" cy="64" r="1.8" fill="#7B8FBF" opacity="0.5"/>

        <circle cx="78" cy="30" r="2.5" fill="#7B8FBF" opacity="0.65"/>
        <circle cx="74" cy="26" r="1.8" fill="#7B8FBF" opacity="0.45"/>

        <!-- ===== TENDRILS (curling ends) ===== -->
        <path d="M30,72 C24,66 22,58 26,52 C28,56 30,64 30,72" fill="none" stroke="#4A7C59" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
        <path d="M76,24 C70,18 62,16 58,20 C62,22 70,24 76,24" fill="none" stroke="#4A7C59" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
        <path d="M34,58 C28,54 26,48 30,44" fill="none" stroke="#4A7C59" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
      </symbol>

      <!-- Ornamental divider -->
      <symbol id="ornament-divider" viewBox="0 0 240 40">

        <path d="M120,16 C116,10 114,4 118,2 C120,6 120,12 120,16Z" fill="#D4705A" opacity="0.8"/>

        <!-- Left scroll vine -->
        <path d="M114,18 C96,20 75,20 56,18 C38,16 24,12 16,18 C12,22 16,28 22,24 C26,21 24,16 20,16"

        <path d="M82,19 C76,12 70,8 68,12 C72,15 78,18 82,19Z" fill="#4A7C59"/>
        <path d="M78,21 C72,28 66,32 66,28 C68,25 74,22 78,21Z" fill="#4A7C59" opacity="0.8"/>
        <path d="M52,18 C46,12 40,9 40,13 C42,16 48,18 52,18Z" fill="#4A7C59"/>
        <path d="M48,20 C42,26 36,28 38,24 C40,22 44,20 48,20Z" fill="#4A7C59" opacity="0.8"/>
        <!-- Left berry -->
        <circle cx="34" cy="14" r="1.8" fill="#7B8FBF" opacity="0.6"/>

        <!-- Right scroll vine (mirrored) -->
        <path d="M126,18 C144,20 165,20 184,18 C202,16 216,12 224,18 C228,22 224,28 218,24 C214,21 216,16 220,16"
              fill="none" stroke="#4A7C59" stroke-width="1.8" stroke-linecap="round"/>
        <!-- Right leaves -->
        <path d="M158,19 C164,12 170,8 172,12 C168,15 162,18 158,19Z" fill="#4A7C59"/>
        <path d="M162,21 C168,28 174,32 174,28 C172,25 166,22 162,21Z" fill="#4A7C59" opacity="0.8"/>
        <path d="M188,18 C194,12 200,9 200,13 C198,16 192,18 188,18Z" fill="#4A7C59"/>
        <path d="M192,20 C198,26 204,28 202,24 C200,22 196,20 192,20Z" fill="#4A7C59" opacity="0.8"/>
        <!-- Right berry -->
        <circle cx="206" cy="14" r="1.8" fill="#7B8FBF" opacity="0.6"/>
      </symbol>
    </defs>
  </svg>

  <div class="page">

              <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>

          <!-- Botanical corner flourishes -->
